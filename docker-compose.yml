  #     retries: 5
  #   deploy:
  #     restart_policy:
  #       condition: on-failure
  #       max_attempts: 5
  #   restart: on-failure

  worker_web:
    build:
      context: .
      dockerfile: Dockerfile.worker_web
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://glukhov:${POSTGRES_PASSWORD:-nNICz0f45ex88SI}@postgres:5432/glukhov_sales
      REDIS_URL: redis://redis:6379/0
      PROXY_LIST_PATH: /config/proxies.txt
      TG_CHANNELS_CONFIG: /config/channels.yaml
      SCRAPER_PROXY_URL: http://squid:3128
    volumes:
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      squid:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    restart: on-failure

  squid:
    image: ubuntu/squid:latest
    volumes:
      - ./config/squid.conf:/etc/squid/squid.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

