services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glukhov_sales
      POSTGRES_USER: glukhov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nNICz0f45ex88SI}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_add_budget_max.sql:/docker-entrypoint-initdb.d/002_add_budget_max.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glukhov -d glukhov_sales"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://glukhov:${POSTGRES_PASSWORD:-nNICz0f45ex88SI}@postgres:5432/glukhov_sales
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    restart: on-failure

  worker_tg:
    build:
      context: .
      dockerfile: Dockerfile.worker_tg
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://glukhov:${POSTGRES_PASSWORD:-nNICz0f45ex88SI}@postgres:5432/glukhov_sales
      TG_CHANNELS_CONFIG: /config/channels.yaml
      TG_SESSION_STRING: ${TG_SESSION_STRING:-}
    volumes:
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 256M
    restart: on-failure

  worker_web:
    build:
      context: .
      dockerfile: Dockerfile.worker_web
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://glukhov:${POSTGRES_PASSWORD:-nNICz0f45ex88SI}@postgres:5432/glukhov_sales
      PROXY_LIST_PATH: /config/proxies.txt
      TG_CHANNELS_CONFIG: /config/channels.yaml
      SCRAPER_PROXY_URL: ${SCRAPER_PROXY_URL:-}
      # zakupki.gov.ru blocks foreign IPs — needs a proxy with Russian IP.
      # profi.ru works directly from Germany.
      SCRAPER_DIRECT_PROXY_URL: ${SCRAPER_DIRECT_PROXY_URL:-}
      SCRAPER_DIRECT_PROXY_USER: ${SCRAPER_DIRECT_PROXY_USER:-}
      SCRAPER_DIRECT_PROXY_PASS: ${SCRAPER_DIRECT_PROXY_PASS:-}
    volumes:
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 1G
    restart: on-failure

  # ── One-time Telegram authorization ──────────────────────────
  # Usage: docker compose run --rm tg-auth
  # Prompts for phone + code, saves TG_SESSION_STRING into .env.
  # After that, regular `docker compose up -d` just works.
  tg-auth:
    profiles: ["auth"]
    build:
      context: .
      dockerfile: Dockerfile.worker_tg
    env_file: .env
    volumes:
      - ./.env:/app/.env
    entrypoint: ["python", "scripts/tg_auth.py"]
    stdin_open: true
    tty: true

volumes:
  pgdata:
