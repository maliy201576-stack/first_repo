services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glukhov_sales
      POSTGRES_USER: glukhov
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nNICz0f45ex88SI}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_add_budget_max.sql:/docker-entrypoint-initdb.d/002_add_budget_max.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glukhov -d glukhov_sales"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://glukhov:${POSTGRES_PASSWORD:-nNICz0f45ex88SI}@postgres:5432/glukhov_sales
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    restart: on-failure

  # worker_tg:
