# Squid proxy config for worker_web
# Allows Docker-internal services to reach the internet

# Listen on port 3128
http_port 3128

# Allow connections from Docker network
acl docker_net src 172.16.0.0/12
acl docker_net src 192.168.0.0/16
acl docker_net src 10.0.0.0/8

# Allow SSL ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Access rules
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow docker_net
http_access deny all

# Logging
access_log none
cache_log /dev/null

# Don't cache anything — we're just proxying
cache deny all

# Timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds

# Hide proxy headers
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
